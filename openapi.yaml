openapi: 3.0.0
info:
  title: Mapping API
  description: |
    OpenAPI specification for the ID Mapping system.

    The API allows translating entity IDs between different data providers
    (Transfermarkt, Wyscout, StatsBomb, SkillCorner, Capology, Impect, etc.)
    for male players, female players, and teams.

    ## Authentication
    All requests require a `token` query parameter. Invalid or missing tokens
    return `401 Unauthorized`.

    ## ID limits
    A maximum of **250 IDs** can be submitted per request.

    ## Response modes
    By default the response is a structured object keyed by the source ID.
    Pass `mode=simple` to receive a flat array instead.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Players
    description: Male player ID mapping between data providers
  - name: Woman Players
    description: Female player ID mapping between data providers
  - name: Teams
    description: Team ID mapping between data providers

# ─────────────────────────────────────────────────────────────
# Reusable components
# ─────────────────────────────────────────────────────────────
components:
  parameters:
    token:
      in: query
      name: token
      required: true
      schema:
        type: string
      description: |
        Authentication token. Must be provided on every request.
        Example: `testtokenaccess`

    from:
      in: query
      name: from
      required: true
      schema:
        type: string
      description: |
        Source provider whose IDs you are translating **from**.
        Accepts both short codes and full names (case-insensitive).

    to:
      in: query
      name: to
      required: true
      schema:
        type: string
      description: |
        Comma-separated list of target providers to translate IDs **to**.
        Example: `wy,sb` or `wyscout,statsbomb`.

    ids:
      in: query
      name: ids
      required: true
      schema:
        type: string
      description: |
        Comma-separated list of IDs in the source provider format.
        Maximum 250 IDs per request.
        Example: `12345,67890,11111`

    mode:
      in: query
      name: mode
      required: false
      schema:
        type: string
        enum: [simple]
      description: |
        Response format mode. Omit for the default structured response.
        Pass `simple` to receive a flat array of matched records.

  responses:
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Unauthorized

    UnprocessableEntity:
      description: |
        One or more request parameters are invalid. Possible messages:
        - `Invalid from provider value (from).`
        - `No target providers provided (to).`
        - `Invalid to provider value (to). Supported providers: ...`
        - `Nothing to do. Providers are equal`
        - `Nothing to do. No ids provided (ids)`
        - `List is too big. Please provide 250 ids at most at once`
        - `Nothing to do. No valid tm ids provided (ids)`
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Invalid from provider value (from)."

  schemas:
    PlayerMatch:
      type: object
      description: |
        A single matched male player record. Contains the player name, team name,
        the source provider ID and all requested target provider IDs.
        Any provider ID that is not found in the database will be `null`.
      properties:
        name:
          type: string
          example: Lionel Messi
        team:
          type: string
          example: Inter Miami
        tm:
          type: integer
          nullable: true
          example: 28003
          description: Transfermarkt ID (integer)
        wy:
          type: string
          nullable: true
          example: "3322"
          description: Wyscout ID
        sb:
          type: string
          nullable: true
          example: "2557"
          description: StatsBomb ID
        sk:
          type: string
          nullable: true
          example: "109"
          description: SkillCorner ID
        cp:
          type: string
          nullable: true
          example: "messi-lionel"
          description: Capology ID
        im:
          type: string
          nullable: true
          example: "4501"
          description: Impect ID

    FemalePlayerMatch:
      type: object
      description: |
        A single matched female player record. Contains the player name,
        the source provider ID and all requested target provider IDs.
        Any provider ID that is not found in the database will be `null`.
      properties:
        name:
          type: string
          example: Alexandra Popp
        sd:
          type: integer
          nullable: true
          example: 112233
          description: Soccerdonna ID (integer, primary key)
        tm:
          type: integer
          nullable: true
          example: 355821
          description: Transfermarkt ID (integer)
        wy:
          type: string
          nullable: true
          example: "784512"
          description: Wyscout ID
        sb:
          type: string
          nullable: true
          example: "133456"
          description: StatsBomb ID
        sk:
          type: string
          nullable: true
          example: "9901"
          description: SkillCorner ID
        im:
          type: string
          nullable: true
          example: "5521"
          description: Impect ID

    TeamMatch:
      type: object
      description: |
        A single matched team record. Contains the team name, league ID,
        the source provider ID and all requested target provider IDs.
        Any provider ID that is not found in the database will be `null`.
      properties:
        name:
          type: string
          example: Bayern Munich
        league_id:
          type: string
          nullable: true
          example: "L1"
          description: League identifier
        tm:
          type: integer
          nullable: true
          example: 27
          description: Transfermarkt ID (integer, primary key)
        wy:
          type: string
          nullable: true
          example: "1657"
          description: Wyscout ID
        sb:
          type: string
          nullable: true
          example: "131"
          description: StatsBomb ID
        sk:
          type: string
          nullable: true
          example: "148"
          description: SkillCorner ID
        elo:
          type: string
          nullable: true
          example: "Bayern Munich"
          description: Club Elo identifier
        oa:
          type: string
          nullable: true
          example: "9001"
          description: OptaAnalytics (OA) ID

# ─────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────
paths:

  # ── MALE PLAYERS ──────────────────────────────────────────
  /api/v1/mapping/players:
    get:
      tags: [Players]
      summary: Translate male player IDs between providers
      description: |
        Returns ID mappings for male players.

        ### Supported providers (`from` / `to`)
        | Short code | Full name     | ID type  |
        |------------|---------------|----------|
        | `tm`       | transfermarkt | integer  |
        | `wy`       | wyscout       | string   |
        | `sb`       | statsbomb     | string   |
        | `sk`       | skillcorner   | string   |
        | `cp`       | capology      | string   |
        | `im`       | impect        | string   |

        > **Note:** When `from=tm`, IDs must be integers.
      operationId: getPlayerMappings
      parameters:
        - $ref: '#/components/parameters/token'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/ids'
        - $ref: '#/components/parameters/mode'
      responses:
        '200':
          description: Mapping results returned
          content:
            application/json:
              schema:
                oneOf:
                  - description: Default response (mode not set)
                    type: object
                    properties:
                      request:
                        type: object
                        description: Echo of the parsed request parameters
                        properties:
                          from:
                            type: string
                            example: tm
                          to:
                            type: array
                            items:
                              type: string
                            example: [wy, sb]
                      matches:
                        type: object
                        description: |
                          Object keyed by the **source provider ID**.
                          Each value is a matched record.
                        additionalProperties:
                          $ref: '#/components/schemas/PlayerMatch'
                        example:
                          "28003":
                            name: Lionel Messi
                            team: Inter Miami
                            tm: 28003
                            wy: "3322"
                            sb: "2557"
                      not_found:
                        type: array
                        description: |
                          Source IDs that had no matching record in the database.
                        items:
                          oneOf:
                            - type: integer
                            - type: string
                        example: [99999]
                  - description: Simple response (mode=simple)
                    type: object
                    properties:
                      matches:
                        type: array
                        items:
                          $ref: '#/components/schemas/PlayerMatch'
                        example:
                          - name: Lionel Messi
                            team: Inter Miami
                            tm: 28003
                            wy: "3322"
                            sb: "2557"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ── FEMALE PLAYERS ────────────────────────────────────────
  /api/v1/mapping/woman_players:
    get:
      tags: [Woman Players]
      summary: Translate female player IDs between providers
      description: |
        Returns ID mappings for female players.

        ### Supported providers (`from` / `to`)
        | Short code | Full name     | ID type  |
        |------------|---------------|----------|
        | `sd`       | soccerdonna   | integer  |
        | `tm`       | transfermarkt | integer  |
        | `wy`       | wyscout       | string   |
        | `sb`       | statsbomb     | string   |
        | `sk`       | skillcorner   | string   |
        | `im`       | impect        | string   |

        > **Note:** When `from=sd` or `from=tm`, IDs must be integers.
      operationId: getWomanPlayerMappings
      parameters:
        - $ref: '#/components/parameters/token'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/ids'
        - $ref: '#/components/parameters/mode'
      responses:
        '200':
          description: Mapping results returned
          content:
            application/json:
              schema:
                oneOf:
                  - description: Default response (mode not set)
                    type: object
                    properties:
                      request:
                        type: object
                        properties:
                          from:
                            type: string
                            example: sd
                          to:
                            type: array
                            items:
                              type: string
                            example: [wy, sk]
                      matches:
                        type: object
                        description: Object keyed by the source provider ID
                        additionalProperties:
                          $ref: '#/components/schemas/FemalePlayerMatch'
                        example:
                          "112233":
                            name: Alexandra Popp
                            sd: 112233
                            wy: "784512"
                            sk: "9901"
                      not_found:
                        type: array
                        items:
                          oneOf:
                            - type: integer
                            - type: string
                        example: [999999]
                  - description: Simple response (mode=simple)
                    type: object
                    properties:
                      matches:
                        type: array
                        items:
                          $ref: '#/components/schemas/FemalePlayerMatch'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ── TEAMS ─────────────────────────────────────────────────
  /api/v1/mapping/teams:
    get:
      tags: [Teams]
      summary: Translate team IDs between providers
      description: |
        Returns ID mappings for teams.

        ### Supported providers (`from` / `to`)
        | Short code | Full name     | ID type  |
        |------------|---------------|----------|
        | `tm`       | transfermarkt | integer  |
        | `wy`       | wyscout       | string   |
        | `sb`       | statsbomb     | string   |
        | `sk`       | skillcorner   | string   |
        | `elo`      | elo           | string   |
        | `oa`       | oa            | string   |

        > **Note:** When `from=tm`, IDs must be integers.
      operationId: getTeamMappings
      parameters:
        - $ref: '#/components/parameters/token'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/ids'
        - $ref: '#/components/parameters/mode'
      responses:
        '200':
          description: Mapping results returned
          content:
            application/json:
              schema:
                oneOf:
                  - description: Default response (mode not set)
                    type: object
                    properties:
                      request:
                        type: object
                        properties:
                          from:
                            type: string
                            example: tm
                          to:
                            type: array
                            items:
                              type: string
                            example: [wy, sb, sk]
                      matches:
                        type: object
                        description: Object keyed by the source provider ID
                        additionalProperties:
                          $ref: '#/components/schemas/TeamMatch'
                        example:
                          "27":
                            name: Bayern Munich
                            league_id: L1
                            tm: 27
                            wy: "1657"
                            sb: "131"
                            sk: "148"
                      not_found:
                        type: array
                        items:
                          oneOf:
                            - type: integer
                            - type: string
                        example: [99999]
                  - description: Simple response (mode=simple)
                    type: object
                    properties:
                      matches:
                        type: array
                        items:
                          $ref: '#/components/schemas/TeamMatch'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
